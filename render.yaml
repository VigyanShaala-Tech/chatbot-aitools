services:
  - type: web
    name: chatbot-websearch
    env: python
    runtime: python3.10
    branch: main
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn websearch:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
        sync: false
    # auto-deploy from GitHub on push to main branch
    autoDeploy: true
