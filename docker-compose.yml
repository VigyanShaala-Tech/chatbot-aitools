version: '3.8'
services:
  web:
    build: .
    container_name: chatbot-websearch
    ports:
      - "3001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GLIFIC_API_URL=${GLIFIC_API_URL}
      - GLIFIC_PHONE=${GLIFIC_PHONE}
      - GLIFIC_PASSWORD=${GLIFIC_PASSWORD}
      - API_KEY=${API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
    restart: unless-stopped
